<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Prompt Format</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fafafa;
        --fg: #18181b;
        --muted: #52525b;
        --card: #ffffff;
        --border: #e4e4e7;
        --primary: #06b6d4;
        --primary-text: #ffffff;
      }

      .dark {
        color-scheme: dark;
        --bg: #18181b;
        --fg: #f4f4f5;
        --muted: #a1a1aa;
        --card: #27272a;
        --border: #3f3f46;
        --primary: #06b6d4;
        --primary-text: #ffffff;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: var(--bg);
        color: var(--fg);
      }

      .wrap {
        max-width: 960px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.8rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: var(--muted);
      }

      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 16px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.04);
      }

      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }

      a,
      button {
        border: 1px solid var(--border);
        background: var(--card);
        color: var(--fg);
        text-decoration: none;
        border-radius: 12px;
        padding: 10px 14px;
        cursor: pointer;
        font: inherit;
        min-height: 44px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      #copy {
        border-color: transparent;
        background: var(--primary);
        color: var(--primary-text);
      }

      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        padding: 14px;
        background: var(--bg);
        border-radius: 12px;
        border: 1px solid var(--border);
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        line-height: 1.5;
        max-height: 70vh;
        overflow: auto;
        color: var(--fg);
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Workout Prompt Format</h1>
      <p>Canonical instructions and schema for AI workout generation.</p>

      <div class="card">
        <div class="actions">
          <button id="copy">Copy Full Prompt Guide</button>
          <a href="/format/prompt.md" target="_blank" rel="noreferrer">Open prompt.md</a>
          <a href="/format/schema.json" target="_blank" rel="noreferrer">Open schema.json</a>
          <a href="/format/example.json" target="_blank" rel="noreferrer">Open example.json</a>
        </div>
        <pre id="content">Loading...</pre>
      </div>
    </div>

    <script>
      if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }

      const content = document.getElementById('content');
      const copy = document.getElementById('copy');
      let textValue = '';

      fetch('/format/prompt.md', { cache: 'no-store' })
        .then((res) => res.text())
        .then((text) => {
          textValue = text;
          content.textContent = text;
        })
        .catch(() => {
          content.textContent = 'Could not load /format/prompt.md';
        });

      copy.addEventListener('click', async () => {
        if (!textValue) return;
        try {
          await navigator.clipboard.writeText(textValue);
          copy.textContent = 'Copied';
          setTimeout(() => {
            copy.textContent = 'Copy Full Prompt Guide';
          }, 1200);
        } catch {
          copy.textContent = 'Copy failed';
        }
      });
    </script>
  </body>
</html>
