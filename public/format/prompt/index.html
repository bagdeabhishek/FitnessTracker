<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Workout Prompt Format</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: #0b1020;
        color: #e7edf7;
      }
      .wrap {
        max-width: 900px;
        margin: 0 auto;
        padding: 24px 16px 48px;
      }
      .card {
        background: #121933;
        border: 1px solid #243056;
        border-radius: 14px;
        padding: 16px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.7rem;
      }
      p {
        margin: 0 0 16px;
        color: #b3c1dd;
      }
      .actions {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      a,
      button {
        border: 1px solid #2f4e97;
        background: #143274;
        color: #e7edf7;
        text-decoration: none;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font: inherit;
      }
      pre {
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        padding: 14px;
        background: #0a132b;
        border-radius: 10px;
        border: 1px solid #1f2f58;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        font-size: 12px;
        line-height: 1.5;
        max-height: 70vh;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Workout Prompt Format</h1>
      <p>Use this as the canonical prompt and JSON rules for workout plan generation.</p>

      <div class="card">
        <div class="actions">
          <button id="copy">Copy Full Prompt Guide</button>
          <a href="/format/prompt.md" target="_blank" rel="noreferrer">Open Raw prompt.md</a>
          <a href="/format/schema.json" target="_blank" rel="noreferrer">Open schema.json</a>
          <a href="/format/example.json" target="_blank" rel="noreferrer">Open example.json</a>
        </div>
        <pre id="content">Loading...</pre>
      </div>
    </div>

    <script>
      const content = document.getElementById('content');
      const copy = document.getElementById('copy');
      let textValue = '';

      fetch('/format/prompt.md', { cache: 'no-store' })
        .then((res) => res.text())
        .then((text) => {
          textValue = text;
          content.textContent = text;
        })
        .catch(() => {
          content.textContent = 'Could not load /format/prompt.md';
        });

      copy.addEventListener('click', async () => {
        if (!textValue) return;
        try {
          await navigator.clipboard.writeText(textValue);
          copy.textContent = 'Copied';
          setTimeout(() => {
            copy.textContent = 'Copy Full Prompt Guide';
          }, 1200);
        } catch {
          copy.textContent = 'Copy failed';
        }
      });
    </script>
  </body>
</html>
